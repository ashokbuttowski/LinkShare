version: '3.8'

services:
  mongodb:
    image: mongo:7.0
    container_name: linkshare-mongo
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    environment:
      - MONGO_INITDB_DATABASE=linkshare_db
    networks:
      - linkshare-network

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: linkshare-backend
    ports:
      - "10002:8001"
    environment:
      - MONGO_URL=mongodb://mongodb:27017
      - DB_NAME=linkshare_db
    depends_on:
      - mongodb
    volumes:
      - ./backend:/app
    networks:
      - linkshare-network

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: linkshare-frontend
    ports:
      - "10001:3000"
    environment:
      - REACT_APP_BACKEND_URL=http://backend:8001
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules
    networks:
      - linkshare-network

volumes:
  mongodb_data:

networks:
  linkshare-network:
    driver: bridge